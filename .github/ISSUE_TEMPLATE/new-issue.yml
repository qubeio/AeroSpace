name: Do not open issues here
description: Internal project — use Linear
body:
  - type: markdown
    attributes:
      value: |
        This is an internal qubeio project. GitHub Issues are not used.

        Track work in [Linear — AeroSpace](https://linear.app/qubeio/project/aerospace).
  - type: checkboxes
    id: checkbox
    attributes:
      label: Acknowledgement
      options:
        - label: I understand issues opened here are not tracked
          required: true
  - type: textarea
    id: body
    attributes:
      label: Body
      value: |
        DO NOT OPEN ISSUES HERE. Use Linear: https://linear.app/qubeio/project/aerospace
    validations:
      required: true
