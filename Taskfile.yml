version: '3'

vars:
  APP_NAME: AeroSpace
  CLI_NAME: aerospace
  INSTALL_PATH: /Applications/{{.APP_NAME}}.app
  CLI_INSTALL_PATH: /usr/local/bin/{{.CLI_NAME}}
  # Override with: task build:release CODESIGN_IDENTITY="Apple Development: ..."
  # Required on dev machines that don't have the "Developer ID Application" private key.
  # Find available identities: security find-identity -v -p codesigning
  CODESIGN_IDENTITY: '{{default "" .CODESIGN_IDENTITY}}'
  # Install tasks pull from origin by default. Skip with: PULL=0
  PULL: '{{default "true" .PULL}}'

tasks:
  pull:
    desc: Fast-forward pull latest commits for the current branch
    cmds:
      - git pull --ff-only

  # Internal: honor PULL=0 / PULL=false escape hatch
  pull:maybe:
    internal: true
    cmds:
      - |
        case "{{.PULL}}" in
          0|false|FALSE|no|NO)
            echo "Skipping git pull (PULL={{.PULL}})"
            ;;
          *)
            git pull --ff-only
            ;;
        esac

  build:
    desc: Build debug version (fast, for development)
    cmds:
      - ./build-debug.sh

  build:release:
    desc: "Build release version (optimized). Override signing: task build:release CODESIGN_IDENTITY=\"Apple Development: ...\""
    cmds:
      - '{{if .CODESIGN_IDENTITY}}./build-release.sh --codesign-identity "{{.CODESIGN_IDENTITY}}"{{else}}./build-release.sh{{end}}'

  install:
    desc: "Pull latest, then install debug build. Skip pull: PULL=0"
    cmds:
      - task: pull:maybe
      - task: build
      - cmd: osascript -e 'quit app "{{.APP_NAME}}"'
        ignore_error: true
      - sleep 1
      - rm -rf "{{.INSTALL_PATH}}"
      - echo "Installing app bundle to {{.INSTALL_PATH}}"
      - xcodebuild -scheme {{.APP_NAME}} -configuration Debug -derivedDataPath .xcode-build install DSTROOT=. INSTALL_PATH=/Applications
      - cp .xcode-build/Build/Products/Debug/{{.APP_NAME}}.app/Contents/MacOS/{{.APP_NAME}} "{{.INSTALL_PATH}}/Contents/MacOS/"
      - echo "Installing CLI to {{.CLI_INSTALL_PATH}}"
      - sudo cp .debug/{{.CLI_NAME}} "{{.CLI_INSTALL_PATH}}"
      - echo "✅ Installed {{.APP_NAME}} and {{.CLI_NAME}}"

  install:simple:
    desc: "Pull latest, then quick-install debug build. Skip pull: PULL=0"
    cmds:
      - task: pull:maybe
      - task: build
      - cmd: osascript -e 'quit app "{{.APP_NAME}}"'
        ignore_error: true
      - sleep 1
      - rm -rf "{{.INSTALL_PATH}}"
      - echo "Building and copying app to {{.INSTALL_PATH}}"
      - xcodebuild -scheme {{.APP_NAME}} -configuration Debug -derivedDataPath .xcode-build build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - cp -r .xcode-build/Build/Products/Debug/{{.APP_NAME}}-Debug.app "{{.INSTALL_PATH}}"
      - echo "Ad-hoc signing app bundle"
      - codesign --force --deep --sign - "{{.INSTALL_PATH}}"
      - echo "Installing CLI to {{.CLI_INSTALL_PATH}}"
      - sudo cp .debug/{{.CLI_NAME}} "{{.CLI_INSTALL_PATH}}"
      - sudo codesign --force --sign - "{{.CLI_INSTALL_PATH}}"
      - echo "✅ Installed {{.APP_NAME}} and {{.CLI_NAME}}"

  install:release:
    desc: Install existing release build from .release/
    cmds:
      - cmd: osascript -e 'quit app "{{.APP_NAME}}"'
        ignore_error: true
      - sleep 1
      - rm -rf "{{.INSTALL_PATH}}"
      - echo "Installing release app to {{.INSTALL_PATH}}"
      - cp -r .release/{{.APP_NAME}}.app "{{.INSTALL_PATH}}"
      - echo "Installing release CLI to {{.CLI_INSTALL_PATH}}"
      - sudo install -m 0755 .release/{{.CLI_NAME}} "{{.CLI_INSTALL_PATH}}"
      - |
        test "$(/usr/bin/stat -f '%Lp' "{{.CLI_INSTALL_PATH}}")" = "755"
      - '"{{.CLI_INSTALL_PATH}}" --version'
      - echo "✅ Installed release version"

  install:release:build:
    desc: "Pull latest, then build and install release. Skip pull: PULL=0"
    cmds:
      - task: pull:maybe
      - task: build:release
      - task: install:release

  uninstall:
    desc: Uninstall locally installed version
    cmds:
      - cmd: osascript -e 'quit app "{{.APP_NAME}}"'
        ignore_error: true
      - rm -rf "{{.INSTALL_PATH}}"
      - sudo rm -f "{{.CLI_INSTALL_PATH}}"
      - echo "✅ Uninstalled {{.APP_NAME}}"

  run:
    desc: Build and run debug version
    deps: [build]
    cmds:
      - ./run-debug.sh

  test:
    desc: Run all tests
    cmds:
      - ./run-tests.sh

  test:watch:
    desc: Run tests on file changes
    cmds:
      - fswatch -o Sources/ | xargs -n1 -I{} task test

  format:
    desc: Format code with swiftformat and swiftlint
    cmds:
      - ./format.sh

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf .build .build-cli .debug .release .xcode-build

  update:
    desc: Pull latest, test, and install debug build
    cmds:
      - task: pull
      - task: test
      - task: install:simple
        vars:
          PULL: "0"

  dev:
    desc: Full development cycle - format, test, build, install
    cmds:
      - task: format
      - task: test
      - task: install:simple
      - echo "✅ Ready for development"

  check:
    desc: Pre-commit checks (format, test, build)
    cmds:
      - task: format
      - task: test
      - task: build
      - echo "✅ All checks passed"
